# 配置数据库连接信息
spring:
  application:
    name: tlias-web-management
  # MySQL连接配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/tilas
    username: root
    password:
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB # 最大请求大小（即包括表单的整个请求的大小）

# Mybatis控制台输出
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true # 开启驼峰命名映射开关

#配置事务管理日志
logging:
  level:
    org.springframework.jdbc.support.JdbcTransactionManager: debug